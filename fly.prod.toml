# fly.prod.toml - Nails & Beauty Co Backoffice (PRODUCTION)
# Deploy with: flyctl deploy --config fly.prod.toml

app = 'nailsco-office-prod'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  REACT_APP_API_URL = "https://nailsco-api-prod.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.response_headers]]
  "Cache-Control" = "public, max-age=31536000, immutable"
  "X-Content-Type-Options" = "nosniff"
  "X-Frame-Options" = "DENY"
  "X-XSS-Protection" = "1; mode=block"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
