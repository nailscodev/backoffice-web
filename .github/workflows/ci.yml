name: CI/CD — Backoffice Web

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint --max-warnings 0
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Type check
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run type check
        run: yarn tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # Build (validates the React build succeeds)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          REACT_APP_API_URL: https://nailsco-backend.fly.dev

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Fly.io (sandbox — main branch)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io (Sandbox)
    needs: [lint, type-check, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Authenticate Docker to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.fly.io/backoffice-web-so8xwa:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=https://nailsco-backend.fly.dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy pre-built image to Fly.io
        run: flyctl deploy --image registry.fly.io/backoffice-web-so8xwa:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Fly.io (production — production branch)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Fly.io (Production)
    needs: [lint, type-check, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

      - name: Authenticate Docker to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.fly.io/nailsco-office-prod:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=https://nailsco-api-prod.fly.dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy pre-built image to Fly.io
        run: flyctl deploy --image registry.fly.io/nailsco-office-prod:${{ github.sha }} --config fly.prod.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
