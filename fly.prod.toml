# fly.prod.toml - Nails & Beauty Co Backoffice (PRODUCTION)
# Deploy with: flyctl deploy --local-only --strategy=immediate --config fly.prod.toml

app = 'nailsco-backoffice-prod'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[build.args]
  REACT_APP_API_URL = "https://nailsco-backend-prod.fly.dev/api/v1"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# SPA routing headers
[[http_service.response_headers]]
  "Cache-Control" = "public, max-age=31536000, immutable"
  "X-Content-Type-Options" = "nosniff"
  "X-Frame-Options" = "DENY"
  "X-XSS-Protection" = "1; mode=block"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
